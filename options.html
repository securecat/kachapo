<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kachapo — Options</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #f4f4f5;
        --surface:   #ffffff;
        --ui-border: #767676;
        --text:      #18181b;
        --muted:     #71717a;
        --accent:    #7C3AED;
        --accent-l:  #ede9fe;
        --danger:    #b91c1c;
        --danger-l:  #fee2e2;
        --radius:    8px;
        --font:      'Hiragino Kaku Gothic Pro', 'Meiryo', 'Noto Sans JP', system-ui, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg:        #18181b;
          --surface:   #27272a;
          --ui-border: #6e6e76;
          --text:      #fafafa;
          --muted:     #a1a1aa;
          --accent:    #a78bfa;
          --accent-l:  #2d1b69;
          --danger:    #f87171;
          --danger-l:  #450a0a;
        }
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 16px;
        line-height: 1.6;
        padding: 40px 16px;
        min-height: 100vh;
      }

      .container {
        max-width: 640px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 32px;
      }

      .logo {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--accent);
      }
      .logo span { color: var(--text); }

      .subtitle {
        font-size: 14px;
        color: var(--muted);
        margin-top: 2px;
      }

      .card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 24px;
      }

      .card-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .card-desc {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 20px;
      }

      .url-list {
        list-style: none;
        padding: 0;
        margin: 0 0 16px;
      }

      .url-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: var(--bg);
        border: 1px solid var(--ui-border);
        border-radius: var(--radius);
        margin-bottom: 8px;
      }

      .url-text {
        flex: 1;
        font-size: 14px;
        word-break: break-all;
      }

      .empty-state {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 16px;
        padding: 12px;
        text-align: center;
      }

      button {
        font-family: var(--font);
        font-size: 14px;
        border-radius: var(--radius);
        cursor: pointer;
        transition: background .12s, color .12s, filter .12s;
        border: 1px solid var(--ui-border);
        padding: 6px 14px;
        background: var(--surface);
        color: var(--text);
      }
      button:hover { background: var(--accent-l); border-color: var(--accent); color: var(--accent); }
      button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

      .remove-btn {
        flex-shrink: 0;
        color: var(--danger);
        border-color: var(--danger);
      }
      .remove-btn:hover { background: var(--danger-l); border-color: var(--danger); color: var(--danger); }

      .add-btn {
        flex-shrink: 0;
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .add-btn:hover { background: var(--accent); filter: brightness(1.12); color: #fff; }

      .add-form {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .url-input {
        flex: 1;
        min-width: 200px;
        font-family: var(--font);
        font-size: 14px;
        padding: 7px 12px;
        border: 1px solid var(--ui-border);
        border-radius: var(--radius);
        background: var(--bg);
        color: var(--text);
      }
      .url-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

      .url-error {
        width: 100%;
        font-size: 14px;
        color: var(--danger);
        min-height: 20px;
      }

      .regex-badge {
        font-size: 11px;
        font-weight: 700;
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 4px;
        padding: 1px 5px;
        flex-shrink: 0;
        letter-spacing: 0.05em;
      }

      .regex-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        white-space: nowrap;
        cursor: pointer;
        flex-shrink: 0;
      }
      .regex-label input[type=checkbox] { cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1 class="logo">ka<span>cha</span>po</h1>
        <p class="subtitle">Options</p>
      </header>

      <div class="card">
        <h2 class="card-title">Excluded URLs</h2>
        <p class="card-desc">
          kachapo will not activate on matching pages, regardless of other settings.
          Add a URL prefix for simple matching, or check "Regex" to use a regular expression.
          Reload the tab after making changes.
        </p>

        <ul class="url-list" id="url-list" aria-label="Excluded URL list" aria-busy="true"></ul>
        <p class="empty-state" id="empty-state" hidden>No excluded URLs.</p>

        <form class="add-form" id="url-form" novalidate>
          <label for="url-input" class="sr-only">URL prefix or regular expression to exclude</label>
          <input
            type="text"
            id="url-input"
            class="url-input"
            placeholder="https://example.com/path/"
            autocomplete="off"
            spellcheck="false"
          >
          <label class="regex-label">
            <input type="checkbox" id="regex-toggle">
            Regex
          </label>
          <button type="submit" class="add-btn">Add</button>
          <p class="url-error" id="url-error" role="alert" aria-live="assertive"></p>
        </form>
      </div>
    </div>
    <script src="options.js" defer></script>
    <script src="content.js" defer></script>
  </body>
</html>
