<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>kachapo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #fafafa;
        --surface:   #ffffff;
        --ui-border: #767676;
        --text:      #18181b;
        --muted:     #646470;
        --accent:    #7C3AED;
        --accent-l:  #ede9fe;
        --success:   #15803d;
        --radius:    8px;
        --font:      'Hiragino Kaku Gothic Pro', 'Meiryo', 'Noto Sans JP', system-ui, sans-serif;
      }

      body {
        width: 300px;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 16px;
        line-height: 1.5;
        padding: 0 0 8px;
      }

      header {
        padding: 16px 16px 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      h1.logo {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--accent);
      }
      h1.logo span { color: var(--text); }

      .saved {
        margin-left: auto;
        color: var(--success);
        opacity: 0;
        transition: opacity .2s;
        pointer-events: none;
      }
      .saved.show { opacity: 1; }

      fieldset {
        padding: 14px 16px;
        border: none;
      }

      legend {
        float: left;
        width: 100%;
        padding-bottom: 10px;
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
      }

      .radio-group {
        clear: left;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .radio-label {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 6px 8px;
        border-radius: var(--radius);
        cursor: pointer;
        transition: background .12s;
      }
      .radio-label:hover { background: var(--accent-l); }

      .radio-label input[type=radio] {
        appearance: none;
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        min-width: 16px;
        border: 2px solid var(--ui-border);
        border-radius: 50%;
        margin-top: 4px;
        cursor: pointer;
        transition: border-color .12s, background .12s;
      }
      .radio-label input[type=radio]:checked {
        border-color: var(--accent);
        background: var(--accent);
        box-shadow: inset 0 0 0 3px var(--surface);
      }
      .radio-label input[type=radio]:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .radio-text { flex: 1; }
      .radio-main { display: block; color: var(--text); }
      .radio-label input:checked ~ .radio-text .radio-main {
        color: var(--accent);
        font-weight: 600;
      }
      .radio-sub {
        display: block;
        color: var(--muted);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg:        #18181b;
          --surface:   #27272a;
          --ui-border: #6e6e76;
          --text:      #fafafa;
          --muted:     #a1a1aa;
          --accent:    #a78bfa;
          --accent-l:  #2d1b69;
          --success:   #22c55e;
        }
      }
    </style>
  </head>
  <body>

    <header>
      <h1 class="logo">ka<span>cha</span>po</h1>
      <span class="saved" id="saved" role="status">Saved ✓</span>
    </header>

    <fieldset>
      <legend>Language</legend>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="lang" value="en">
          <span class="radio-text"><span class="radio-main">English</span></span>
        </label>
        <label class="radio-label">
          <input type="radio" name="lang" value="ja">
          <span class="radio-text"><span class="radio-main">Japanese</span></span>
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Color</legend>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="color" value="light">
          <span class="radio-text">
            <span class="radio-main">Light theme</span>
            <span class="radio-sub">Black stroke on onomatopoeia</span>
          </span>
        </label>
        <label class="radio-label">
          <input type="radio" name="color" value="dark">
          <span class="radio-text">
            <span class="radio-main">Dark theme</span>
            <span class="radio-sub">White stroke on onomatopoeia</span>
          </span>
        </label>
        <label class="radio-label">
          <input type="radio" name="color" value="device">
          <span class="radio-text">
            <span class="radio-main">Device default</span>
            <span class="radio-sub">Follows prefers-color-scheme</span>
          </span>
        </label>
      </div>
    </fieldset>

    <script src="popup.js" defer></script>
  </body>
</html>
