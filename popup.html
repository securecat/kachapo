<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>kachapo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #fafafa;
    --surface:  #ffffff;
    --border:   #e4e4e7;
    --text:     #18181b;
    --muted:    #71717a;
    --accent:   #7C3AED;
    --accent-l: #ede9fe;
    --radius:   8px;
    --font:     'Hiragino Kaku Gothic Pro', 'Meiryo', 'Noto Sans JP', system-ui, sans-serif;
  }

  body {
    width: 260px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    padding: 0 0 4px;
  }

  header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .saved {
    margin-left: auto;
    font-size: 11px;
    color: #16a34a;
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }
  .saved.show { opacity: 1; }

  section {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  section:last-child { border-bottom: none; }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .radio-group { display: flex; flex-direction: column; gap: 2px; }

  .radio-label {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 5px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .12s;
  }
  .radio-label:hover { background: var(--accent-l); }

  .radio-label input[type=radio] {
    appearance: none;
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    min-width: 14px;
    border: 2px solid var(--border);
    border-radius: 50%;
    margin-top: 1px;
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .radio-label input[type=radio]:checked {
    border-color: var(--accent);
    background: var(--accent);
    box-shadow: inset 0 0 0 2px var(--surface);
  }

  .radio-text { flex: 1; }
  .radio-main { display: block; color: var(--text); font-size: 13px; }
  .radio-label input:checked ~ .radio-text .radio-main {
    color: var(--accent);
    font-weight: 600;
  }
  .radio-sub {
    display: block;
    font-size: 10.5px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <div class="logo">ka<span>cha</span>po</div>
  <div class="saved" id="saved">Saved ✓</div>
</header>

<section>
  <div class="section-label">Language</div>
  <div class="radio-group">
    <label class="radio-label">
      <input type="radio" name="lang" value="en">
      <span class="radio-text"><span class="radio-main">English</span></span>
    </label>
    <label class="radio-label">
      <input type="radio" name="lang" value="ja">
      <span class="radio-text"><span class="radio-main">Japanese</span></span>
    </label>
  </div>
</section>

<section>
  <div class="section-label">Color</div>
  <div class="radio-group">
    <label class="radio-label">
      <input type="radio" name="color" value="light">
      <span class="radio-text">
        <span class="radio-main">Light theme</span>
        <span class="radio-sub">Black stroke on onomatopoeia</span>
      </span>
    </label>
    <label class="radio-label">
      <input type="radio" name="color" value="dark">
      <span class="radio-text">
        <span class="radio-main">Dark theme</span>
        <span class="radio-sub">White stroke on onomatopoeia</span>
      </span>
    </label>
    <label class="radio-label">
      <input type="radio" name="color" value="device">
      <span class="radio-text">
        <span class="radio-main">Device default</span>
        <span class="radio-sub">Follows prefers-color-scheme</span>
      </span>
    </label>
  </div>
</section>

<script src="popup.js"></script>
</body>
</html>
