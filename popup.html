<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>kachapo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:       #fafafa;
        --surface:  #ffffff;
        --border:   #e4e4e7;
        --text:     #18181b;
        --muted:    #646470;
        --accent:   #7C3AED;
        --accent-l: #ede9fe;
        --success:  #15803d;
        --radius:   8px;
        --font:     'Hiragino Kaku Gothic Pro', 'Meiryo', 'Noto Sans JP', system-ui, sans-serif;
      }

      body {
        width: 260px;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 13px;
        line-height: 1.5;
        padding: 0 0 4px;
      }

      header {
        padding: 14px 16px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      h1.logo {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--accent);
      }
      h1.logo span { color: var(--text); }

      .saved {
        margin-left: auto;
        font-size: 11px;
        color: var(--success);
        opacity: 0;
        transition: opacity .2s;
        pointer-events: none;
      }
      .saved.show { opacity: 1; }

      fieldset {
        padding: 12px 16px;
        border: none;
        border-bottom: 1px solid var(--border);
      }
      fieldset:last-of-type { border-bottom: none; }

      legend {
        float: left;
        width: 100%;
        padding-bottom: 8px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .radio-group {
        clear: left;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .radio-label {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        padding: 5px 8px;
        border-radius: var(--radius);
        cursor: pointer;
        transition: background .12s;
      }
      .radio-label:hover { background: var(--accent-l); }

      .radio-label input[type=radio] {
        appearance: none;
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        min-width: 14px;
        border: 2px solid var(--border);
        border-radius: 50%;
        margin-top: 1px;
        cursor: pointer;
        transition: border-color .12s, background .12s;
      }
      .radio-label input[type=radio]:checked {
        border-color: var(--accent);
        background: var(--accent);
        box-shadow: inset 0 0 0 2px var(--surface);
      }
      .radio-label input[type=radio]:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .radio-text { flex: 1; }
      .radio-main { display: block; color: var(--text); font-size: 13px; }
      .radio-label input:checked ~ .radio-text .radio-main {
        color: var(--accent);
        font-weight: 600;
      }
      .radio-sub {
        display: block;
        font-size: 10.5px;
        color: var(--muted);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg:       #18181b;
          --surface:  #27272a;
          --border:   #3f3f46;
          --text:     #fafafa;
          --muted:    #a1a1aa;
          --accent:   #a78bfa;
          --accent-l: #2d1b69;
          --success:  #22c55e;
        }
      }
    </style>
  </head>
  <body>

    <header>
      <h1 class="logo">ka<span>cha</span>po</h1>
      <span class="saved" id="saved" role="status">Saved ✓</span>
    </header>

    <fieldset>
      <legend>Language</legend>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="lang" value="en">
          <span class="radio-text"><span class="radio-main">English</span></span>
        </label>
        <label class="radio-label">
          <input type="radio" name="lang" value="ja">
          <span class="radio-text"><span class="radio-main">Japanese</span></span>
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Color</legend>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="color" value="light">
          <span class="radio-text">
            <span class="radio-main">Light theme</span>
            <span class="radio-sub">Black stroke on onomatopoeia</span>
          </span>
        </label>
        <label class="radio-label">
          <input type="radio" name="color" value="dark">
          <span class="radio-text">
            <span class="radio-main">Dark theme</span>
            <span class="radio-sub">White stroke on onomatopoeia</span>
          </span>
        </label>
        <label class="radio-label">
          <input type="radio" name="color" value="device">
          <span class="radio-text">
            <span class="radio-main">Device default</span>
            <span class="radio-sub">Follows prefers-color-scheme</span>
          </span>
        </label>
      </div>
    </fieldset>

    <script src="popup.js" defer></script>
  </body>
</html>
