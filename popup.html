<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>kachapo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #fafafa;
        --surface:   #ffffff;
        --ui-border: #767676;
        --text:      #18181b;
        --accent:    #7C3AED;
        --accent-l:  #ede9fe;
        --radius:    8px;
        --font:      'Hiragino Kaku Gothic Pro', 'Meiryo', 'Noto Sans JP', system-ui, sans-serif;
      }

      body {
        width: 300px;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 16px;
        line-height: 1.5;
        padding: 0 0 8px;
      }

      header {
        padding: 16px 16px 14px;
      }

      h1.logo {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--accent);
      }
      h1.logo span { color: var(--text); }

      fieldset {
        padding: 14px 16px;
        border: none;
      }

      legend {
        float: left;
        width: 100%;
        padding-bottom: 10px;
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
      }

      .radio-group {
        clear: left;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .radio-label {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 8px;
        border-radius: var(--radius);
        cursor: pointer;
        transition: background .12s;
      }
      .radio-label:hover { background: var(--accent-l); }

      .radio-label input[type=radio] {
        appearance: none;
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        min-width: 16px;
        border: 2px solid var(--ui-border);
        border-radius: 50%;
        cursor: pointer;
        transition: border-color .12s, background .12s;
      }
      .radio-label input[type=radio]:checked {
        border-color: var(--accent);
        background: var(--accent);
        box-shadow: inset 0 0 0 3px var(--surface);
      }
      .radio-label input[type=radio]:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .radio-main { color: var(--text); }
      .radio-label input:checked ~ .radio-main {
        color: var(--accent);
        font-weight: 600;
      }

      @keyframes kp-popup {
        0%   { opacity: 0; transform: scale(0.4) rotate(var(--rot)); }
        15%  { opacity: 1; transform: scale(1.3) rotate(var(--rot)); }
        55%  { opacity: 1; transform: scale(1.0) rotate(var(--rot)); }
        100% { opacity: 0; transform: scale(0.85) translateY(-22px) rotate(var(--rot)); }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg:        #18181b;
          --surface:   #27272a;
          --ui-border: #6e6e76;
          --text:      #fafafa;
          --accent:    #a78bfa;
          --accent-l:  #2d1b69;
        }
      }
    </style>
  </head>
  <body>

    <header>
      <h1 class="logo">ka<span>cha</span>po</h1>
    </header>

    <fieldset>
      <legend>Language</legend>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="lang" value="en">
          <span class="radio-main">English</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="lang" value="ja">
          <span class="radio-main">Japanese</span>
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Kachapo color</legend>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="color" value="light">
          <span class="radio-main">黒で縁取り</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="color" value="dark">
          <span class="radio-main">白で縁取り</span>
        </label>
      </div>
    </fieldset>

    <script src="popup.js" defer></script>
  </body>
</html>
