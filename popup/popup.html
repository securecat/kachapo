<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>kachapo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #fafafa;
        --surface:   #ffffff;
        --ui-border: #767676;
        --text:      #18181b;
        --muted:     #595959;
        --accent:    #7C3AED;
        --accent-l:  #ede9fe;
        --radius:    8px;
        --font:      'Hiragino Kaku Gothic Pro', 'Meiryo', 'Noto Sans JP', system-ui, sans-serif;
      }

      body {
        width: 250px;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 16px;
        line-height: 1.5;
        padding: 0 0 6px;
      }

      header {
        padding: 12px 14px 10px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .options-link {
        font-size: 14px;
        color: LinkText;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .options-link:hover { text-decoration-thickness: 2px; }
      .options-link:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 2px;
      }

      h1.logo {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--accent);
      }
      h1.logo span { color: var(--text); }

      fieldset {
        padding: 7px 14px;
        border: none;
      }

      legend {
        float: left;
        width: 100%;
        padding-bottom: 5px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      /* ─ ラジオ ─ */
      .radio-group {
        clear: left;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
      }

      .radio-label {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 4px 6px;
        border-radius: var(--radius);
        cursor: pointer;
        transition: background .12s;
      }
      .radio-label:hover { background: var(--accent-l); }

      .radio-label input[type=radio] {
        appearance: none;
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        min-width: 14px;
        border: 2px solid var(--ui-border);
        border-radius: 50%;
        cursor: pointer;
        transition: border-color .12s, background .12s;
      }
      .radio-label input[type=radio]:checked {
        border-color: var(--accent);
        background: var(--accent);
        box-shadow: inset 0 0 0 2px var(--surface);
      }
      .radio-label input[type=radio]:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .radio-main { color: var(--text); }
      .radio-label input:checked ~ .radio-main {
        color: var(--accent);
        font-weight: 600;
      }

      /* ─ チェックボックス ─ */
      .check-group {
        clear: left;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
      }

      .check-label {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 4px 6px;
        border-radius: var(--radius);
        cursor: pointer;
        transition: background .12s;
      }
      .check-label:hover { background: var(--accent-l); }

      .check-label input[type=checkbox] {
        appearance: none;
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        min-width: 14px;
        border: 2px solid var(--ui-border);
        border-radius: 3px;
        cursor: pointer;
        transition: border-color .12s, background .12s;
        position: relative;
      }
      .check-label input[type=checkbox]:checked {
        border-color: var(--accent);
        background: var(--accent);
      }
      .check-label input[type=checkbox]:checked::after {
        content: '';
        position: absolute;
        left: 2px;
        top: -1px;
        width: 5px;
        height: 8px;
        border: 2px solid #fff;
        border-top: none;
        border-left: none;
        transform: rotate(45deg);
      }
      .check-label input[type=checkbox]:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .check-main { color: var(--text); }
      .check-label input:checked ~ .check-main {
        color: var(--accent);
        font-weight: 600;
      }

      .trig-divider {
        border: none;
        border-top: 1px dashed var(--ui-border);
        margin: 2px 0 4px;
      }

      @keyframes kp-popup {
        0%   { opacity: 0; transform: scale(0.4) rotate(var(--rot)); }
        15%  { opacity: 1; transform: scale(1.3) rotate(var(--rot)); }
        55%  { opacity: 1; transform: scale(1.0) rotate(var(--rot)); }
        100% { opacity: 0; transform: scale(0.85) translateY(-22px) rotate(var(--rot)); }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg:        #18181b;
          --surface:   #27272a;
          --ui-border: #6e6e76;
          --text:      #fafafa;
          --muted:     #a1a1aa;
          --accent:    #a78bfa;
          --accent-l:  #2d1b69;
        }
      }
    </style>
  </head>
  <body>

    <header>
      <h1 class="logo">ka<span>cha</span>po</h1>
      <a href="#" class="options-link" id="options-link">Options</a>
    </header>

    <fieldset>
      <legend>Language</legend>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="lang" value="en">
          <span class="radio-main">English</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="lang" value="ja">
          <span class="radio-main">Japanese</span>
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Text stroke</legend>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="color" value="light">
          <span class="radio-main">Black</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="color" value="dark">
          <span class="radio-main">White</span>
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Triggers</legend>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="all-trig" value="on">
          <span class="radio-main">Enabled</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="all-trig" value="off">
          <span class="radio-main">Disabled</span>
        </label>
      </div>
      <hr class="trig-divider">
      <div class="check-group">
        <label class="check-label">
          <input type="checkbox" name="trig" value="click">
          <span class="check-main">Click</span>
        </label>
        <label class="check-label">
          <input type="checkbox" name="trig" value="drag">
          <span class="check-main">Drag</span>
        </label>
        <label class="check-label">
          <input type="checkbox" name="trig" value="wheel">
          <span class="check-main">Wheel</span>
        </label>
        <label class="check-label">
          <input type="checkbox" name="trig" value="typing">
          <span class="check-main">Typing</span>
        </label>
      </div>
    </fieldset>

    <script src="popup.js" defer></script>
  </body>
</html>
